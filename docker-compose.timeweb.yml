services:
  church-site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: church-site
    restart: unless-stopped
    env_file:
      - server/timeweb-vps/.env
    ports:
      - "127.0.0.1:8088:8080"
    read_only: true
    tmpfs:
      - /tmp:size=16m,noexec,nosuid
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
